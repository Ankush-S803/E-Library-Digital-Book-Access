<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LibraX — Digital Book Access System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0f14;
  --surface:  #13161e;
  --card:     #1a1e28;
  --border:   #2a2f3e;
  --gold:     #c9a84c;
  --gold-lt:  #e8c97e;
  --teal:     #4ecdc4;
  --red:      #e05252;
  --text:     #e8e4d9;
  --muted:    #7a7f8e;
  --sm: .85rem; --base: 1rem; --lg: 1.1rem;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
 
/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
 
/* ── HEADER ── */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);letter-spacing:.04em}
.logo span{color:var(--text);font-style:italic}
nav{display:flex;gap:.25rem}
nav button{background:none;border:none;color:var(--muted);padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:var(--sm);transition:all .2s}
nav button:hover,nav button.active{color:var(--text);background:var(--card)}
.user-badge{display:flex;align-items:center;gap:.75rem;font-size:var(--sm)}
.user-badge .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#0d0f14}
#logoutBtn{background:none;border:1px solid var(--border);color:var(--muted);padding:.35rem .75rem;border-radius:5px;cursor:pointer;font-size:var(--sm);transition:all .2s}
#logoutBtn:hover{border-color:var(--red);color:var(--red)}
 
/* ── PAGES ── */
.page{display:none;padding:2rem;max-width:1200px;margin:0 auto;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
 
/* ── AUTH ── */
#authPage{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at 20% 50%, #1a1622 0%, var(--bg) 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.6)}
.auth-logo{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);text-align:center;margin-bottom:.5rem}
.auth-tagline{text-align:center;color:var(--muted);font-size:var(--sm);margin-bottom:2rem}
.tabs{display:flex;background:var(--card);border-radius:8px;padding:4px;margin-bottom:1.75rem;gap:4px}
.tab{flex:1;padding:.5rem;border:none;background:none;color:var(--muted);border-radius:5px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .2s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
 
/* ── FORM ELEMENTS ── */
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:var(--sm);color:var(--muted);margin-bottom:.4rem;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.65rem .9rem;color:var(--text);font-family:'DM Sans',sans-serif;font-size:var(--base);transition:border .2s;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold)}
.field select option{background:var(--card)}
 
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.65rem 1.4rem;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;font-size:var(--sm);transition:all .2s}
.btn-primary{background:var(--gold);color:#0d0f14}
.btn-primary:hover{background:var(--gold-lt)}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-teal{background:var(--teal);color:#0d0f14}
.btn-teal:hover{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{opacity:.85}
.btn-sm{padding:.4rem .8rem;font-size:var(--sm)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-full{width:100%}
 
/* ── TOAST ── */
#toast{position:fixed;bottom:2rem;right:2rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem 1.25rem;font-size:var(--sm);max-width:320px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:.75rem}
#toast.show{transform:none;opacity:1}
#toast.success{border-color:var(--teal)}
#toast.error{border-color:var(--red)}
.toast-icon{font-size:1.1rem}
 
/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;gap:.35rem}
.stat-val{font-size:1.8rem;font-family:'Playfair Display',serif;color:var(--gold);font-weight:700}
.stat-label{font-size:var(--sm);color:var(--muted)}
 
/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.sec-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--text)}
.sec-title span{color:var(--gold)}
 
/* ── SEARCH/FILTER BAR ── */
.search-bar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.65rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none}
.search-bar input:focus{border-color:var(--gold)}
.search-bar select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.65rem 1rem;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
 
/* ── BOOK GRID ── */
.book-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.25rem}
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;transition:border-color .2s,transform .2s}
.book-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.book-badge{display:inline-flex;align-items:center;gap:.35rem;font-size:.75rem;font-family:'JetBrains Mono',monospace;padding:.25rem .6rem;border-radius:4px;font-weight:500}
.badge-avail{background:rgba(78,205,196,.12);color:var(--teal);border:1px solid rgba(78,205,196,.2)}
.badge-unavail{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.2)}
.book-title{font-family:'Playfair Display',serif;font-size:1.05rem;line-height:1.35;color:var(--text)}
.book-meta{font-size:var(--sm);color:var(--muted);line-height:1.6}
.book-meta strong{color:var(--text);font-weight:500}
.book-desc{font-size:var(--sm);color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-actions{display:flex;gap:.5rem;margin-top:auto}
 
/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:var(--sm)}
th{background:var(--card);color:var(--muted);font-weight:500;padding:.75rem 1rem;text-align:left;font-size:.8rem;letter-spacing:.05em;text-transform:uppercase}
td{padding:.75rem 1rem;border-top:1px solid var(--border);color:var(--text);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
.status-badge{display:inline-block;padding:.2rem .6rem;border-radius:4px;font-size:.75rem;font-family:'JetBrains Mono',monospace}
.status-active{background:rgba(201,168,76,.12);color:var(--gold)}
.status-returned{background:rgba(78,205,196,.12);color:var(--teal)}
.status-overdue{background:rgba(224,82,82,.12);color:var(--red)}
 
/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:480px;animation:fadeIn .25s ease}
.modal-title{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:1.25rem;color:var(--gold)}
.modal-footer{display:flex;justify-content:flex-end;gap:.75rem;margin-top:1.5rem}
 
/* ── STARS ── */
.stars{display:flex;gap:.3rem;margin-bottom:.75rem}
.star{font-size:1.4rem;cursor:pointer;color:var(--border);transition:color .15s}
.star.active,.star:hover~.star,.stars:hover .star{color:var(--border)}
.stars:hover .star,.star:hover{color:var(--gold)}
.star.active{color:var(--gold)}
 
/* ── WISHLIST ICON ── */
.wish-btn{background:none;border:none;cursor:pointer;font-size:1.1rem;transition:transform .2s}
.wish-btn:hover{transform:scale(1.2)}
 
/* ── EMPTY STATE ── */
.empty{text-align:center;padding:4rem 2rem;color:var(--muted)}
.empty .icon{font-size:3rem;display:block;margin-bottom:1rem}
.empty p{font-size:var(--sm);max-width:260px;margin:0 auto;line-height:1.6}
 
/* ── RESPONSIVE ── */
@media(max-width:700px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  header{padding:0 1rem}
  nav button span{display:none}
}
</style>
</head>
<body>
 
<!-- AUTH PAGE -->
<div id="authPage">
  <div class="auth-card">
    <div class="auth-logo">Libra<span>X</span></div>
    <p class="auth-tagline">TCET · Digital Book Access System</p>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>
 
    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="you@tcet.ac.in"/></div>
      <div class="field"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"/></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Sign In</button>
      <p style="text-align:center;margin-top:1rem;font-size:.8rem;color:var(--muted)">Demo: admin@elibrary.com / admin123</p>
    </div>
 
    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none">
      <div class="field"><label>Full Name</label><input type="text" id="regName" placeholder="Your name"/></div>
      <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="you@tcet.ac.in"/></div>
      <div class="field"><label>Password</label><input type="password" id="regPass" placeholder="••••••••"/></div>
      <div class="field"><label>Membership</label>
        <select id="regType">
          <option value="standard">Standard (3 books)</option>
          <option value="premium">Premium (5 books)</option>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRegister()">Create Account</button>
    </div>
  </div>
</div>
 
<!-- MAIN APP -->
<div id="appShell" style="display:none">
  <header>
    <div class="logo">Libra<span>X</span></div>
    <nav>
      <button class="active" onclick="showPage('catalogPage',this)"><span>📚</span> Catalog</button>
      <button onclick="showPage('myBooksPage',this)"><span>📖</span> My Books</button>
      <button onclick="showPage('wishlistPage',this)"><span>❤️</span> Wishlist</button>
    </nav>
    <div class="user-badge">
      <div class="avatar" id="userAvatar">U</div>
      <div>
        <div id="userName" style="font-weight:500;font-size:.85rem"></div>
        <div id="userType" style="font-size:.73rem;color:var(--gold)"></div>
      </div>
      <button id="logoutBtn" onclick="logout()">Sign Out</button>
    </div>
  </header>
 
  <!-- CATALOG PAGE -->
  <div id="catalogPage" class="page active">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-val" id="s1">—</div><div class="stat-label">Total Books</div></div>
      <div class="stat-card"><div class="stat-val" id="s2">—</div><div class="stat-label">Active Members</div></div>
      <div class="stat-card"><div class="stat-val" id="s3">—</div><div class="stat-label">Currently Borrowed</div></div>
      <div class="stat-card"><div class="stat-val" id="s4">—</div><div class="stat-label">Total Checkouts</div></div>
    </div>
 
    <div class="sec-header">
      <h2 class="sec-title">Book <span>Catalog</span></h2>
    </div>
    <div class="search-bar">
      <input id="searchInput" placeholder="🔍  Search by title or author…" oninput="filterBooks()"/>
      <select id="catFilter" onchange="filterBooks()">
        <option value="">All Categories</option>
      </select>
    </div>
    <div class="book-grid" id="bookGrid"></div>
  </div>
 
  <!-- MY BOOKS PAGE -->
  <div id="myBooksPage" class="page">
    <div class="sec-header">
      <h2 class="sec-title">My <span>Borrowed Books</span></h2>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Title</th><th>Author</th><th>Borrowed</th><th>Due</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="borrowBody"></tbody>
      </table>
    </div>
  </div>
 
  <!-- WISHLIST PAGE -->
  <div id="wishlistPage" class="page">
    <div class="sec-header">
      <h2 class="sec-title">My <span>Wishlist</span></h2>
    </div>
    <div class="book-grid" id="wishGrid"></div>
  </div>
</div>
 
<!-- REVIEW MODAL -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <div class="modal-title">✍️ Write a Review</div>
    <p id="reviewBookTitle" style="color:var(--muted);margin-bottom:1rem;font-size:var(--sm)"></p>
    <div class="stars" id="starRow">
      <span class="star" data-v="1" onclick="setRating(1)">★</span>
      <span class="star" data-v="2" onclick="setRating(2)">★</span>
      <span class="star" data-v="3" onclick="setRating(3)">★</span>
      <span class="star" data-v="4" onclick="setRating(4)">★</span>
      <span class="star" data-v="5" onclick="setRating(5)">★</span>
    </div>
    <div class="field"><textarea id="reviewComment" rows="3" placeholder="Share your thoughts…" style="resize:none"></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('reviewModal')">Cancel</button>
      <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
    </div>
  </div>
</div>
 
<!-- TOAST -->
<div id="toast"><span class="toast-icon" id="toastIcon"></span><span id="toastMsg"></span></div>
 
<script>
const API = 'http://localhost:8000/api';
let currentUser = null;
let allBooks    = [];
let reviewBookId = null;
let currentRating = 0;
 
// ── AUTH ─────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',i===(t==='login'?0:1)));
  document.getElementById('loginForm').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('registerForm').style.display = t==='register' ? '' : 'none';
}
 
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!email||!password) return toast('Please fill all fields.','error');
  const res = await api('/login','POST',{email,password});
  if (res.success) { currentUser = res.user; initApp(); }
}
 
async function doRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  const type  = document.getElementById('regType').value;
  if(!name||!email||!pass) return toast('Please fill all fields.','error');
  const res = await api('/register','POST',{name,email,password:pass,membership_type:type});
  if(res.success){ toast('Account created! Please sign in.','success'); switchTab('login'); }
}
 
function logout() {
  currentUser = null;
  document.getElementById('authPage').style.display   = 'flex';
  document.getElementById('appShell').style.display   = 'none';
}
 
// ── INIT ─────────────────────────────────────────────────────
async function initApp() {
  document.getElementById('authPage').style.display  = 'none';
  document.getElementById('appShell').style.display  = 'block';
  document.getElementById('userName').textContent    = currentUser.name;
  document.getElementById('userType').textContent    = currentUser.membership_type.toUpperCase();
  document.getElementById('userAvatar').textContent  = currentUser.name[0].toUpperCase();
  await loadStats();
  await loadCategories();
  await loadBooks();
}
 
// ── NAVIGATION ───────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if(id==='myBooksPage')  loadMyBooks();
  if(id==='wishlistPage') loadWishlist();
}
 
// ── STATS ─────────────────────────────────────────────────────
async function loadStats() {
  const s = await api('/stats');
  document.getElementById('s1').textContent = s.total_books;
  document.getElementById('s2').textContent = s.total_users;
  document.getElementById('s3').textContent = s.active_borrows;
  document.getElementById('s4').textContent = s.total_borrows;
}
 
// ── CATEGORIES ───────────────────────────────────────────────
async function loadCategories() {
  const cats = await api('/categories');
  const sel = document.getElementById('catFilter');
  cats.forEach(c=>{
    const o = document.createElement('option');
    o.value=c.name; o.textContent=c.name; sel.appendChild(o);
  });
}
 
// ── BOOKS ─────────────────────────────────────────────────────
async function loadBooks() {
  allBooks = await api('/books');
  renderBooks(allBooks);
}
 
function filterBooks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const c = document.getElementById('catFilter').value;
  const filtered = allBooks.filter(b=>{
    const match = b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
    const catOk = !c || b.category===c;
    return match && catOk;
  });
  renderBooks(filtered);
}
 
function renderBooks(books) {
  const grid = document.getElementById('bookGrid');
  if(!books.length){ grid.innerHTML='<div class="empty"><span class="icon">🔎</span><p>No books found matching your search.</p></div>'; return; }
  grid.innerHTML = books.map(b=>`
    <div class="book-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <span class="book-badge ${b.available_copies>0?'badge-avail':'badge-unavail'}">
          ${b.available_copies>0?`✓ ${b.available_copies} Available`:'✗ Unavailable'}
        </span>
        <button class="wish-btn" onclick="toggleWish(${b.book_id},this)" title="Wishlist">🤍</button>
      </div>
      <div class="book-title">${b.title}</div>
      <div class="book-meta">
        <strong>${b.author}</strong><br>
        ${b.category} · ${b.published_year||'—'}
      </div>
      <p class="book-desc">${b.description||''}</p>
      <div class="book-actions">
        ${b.available_copies>0
          ? `<button class="btn btn-primary btn-sm" onclick="borrowBook(${b.book_id})">📥 Borrow</button>`
          : `<button class="btn btn-outline btn-sm" disabled>Unavailable</button>`}
        <button class="btn btn-outline btn-sm" onclick="openReview(${b.book_id},'${b.title.replace(/'/g,"\\'")}')">★ Review</button>
      </div>
    </div>`).join('');
}
 
// ── BORROW ────────────────────────────────────────────────────
async function borrowBook(bookId) {
  const res = await api('/borrow','POST',{user_id:currentUser.user_id,book_id:bookId});
  if(res.success){ toast(res.message,'success'); await loadBooks(); await loadStats(); }
}
 
// ── WISHLIST ──────────────────────────────────────────────────
async function toggleWish(bookId, btn) {
  const res = await api('/wishlist','POST',{user_id:currentUser.user_id,book_id:bookId});
  if(res.success){
    btn.textContent = btn.textContent==='🤍' ? '❤️' : '🤍';
    toast(res.message,'success');
  }
}
 
async function loadWishlist() {
  const items = await api(`/user/${currentUser.user_id}/wishlist`);
  const grid  = document.getElementById('wishGrid');
  if(!items.length){ grid.innerHTML='<div class="empty"><span class="icon">❤️</span><p>Your wishlist is empty. Add books from the catalog.</p></div>'; return; }
  grid.innerHTML = items.map(b=>`
    <div class="book-card">
      <span class="book-badge ${b.available_copies>0?'badge-avail':'badge-unavail'}">
        ${b.available_copies>0?'✓ Available':'✗ Unavailable'}
      </span>
      <div class="book-title">${b.title}</div>
      <div class="book-meta"><strong>${b.author}</strong> · ${b.category}</div>
      <div class="book-actions">
        ${b.available_copies>0
          ? `<button class="btn btn-primary btn-sm" onclick="borrowBook(${b.book_id})">📥 Borrow</button>`
          : `<button class="btn btn-outline btn-sm" disabled>Unavailable</button>`}
        <button class="btn btn-red btn-sm" onclick="removeWish(${b.book_id})">Remove</button>
      </div>
    </div>`).join('');
}
 
async function removeWish(bookId) {
  await api('/wishlist','POST',{user_id:currentUser.user_id,book_id:bookId});
  toast('Removed from wishlist.','success');
  loadWishlist();
}
 
// ── MY BOOKS ──────────────────────────────────────────────────
async function loadMyBooks() {
  const rows = await api(`/user/${currentUser.user_id}/borrowed`);
  const tbody = document.getElementById('borrowBody');
  if(!rows.length){ tbody.innerHTML='<tr><td colspan="6"><div class="empty" style="padding:2rem"><span class="icon">📚</span><p>You have no borrowed books.</p></div></td></tr>'; return; }
  tbody.innerHTML = rows.map(r=>`
    <tr>
      <td style="font-weight:500">${r.title}</td>
      <td style="color:var(--muted)">${r.author}</td>
      <td style="font-size:.8rem;color:var(--muted)">${r.borrowed_at?.slice(0,10)}</td>
      <td style="font-size:.8rem;color:${r.status==='overdue'?'var(--red)':'var(--muted)'}">${r.due_date?.slice(0,10)}</td>
      <td><span class="status-badge status-${r.status}">${r.status}</span></td>
      <td>
        ${r.status==='active'
          ? `<button class="btn btn-teal btn-sm" onclick="returnBook(${r.record_id})">↩ Return</button>`
          : `<span style="color:var(--muted);font-size:.8rem">Returned</span>`}
      </td>
    </tr>`).join('');
}
 
async function returnBook(recordId) {
  const res = await api('/return','POST',{record_id:recordId});
  if(res.success){ toast(res.message,'success'); loadMyBooks(); loadStats(); }
}
 
// ── REVIEWS ──────────────────────────────────────────────────
function openReview(bookId, title) {
  reviewBookId = bookId;
  currentRating = 0;
  document.getElementById('reviewBookTitle').textContent = title;
  document.getElementById('reviewComment').value = '';
  document.querySelectorAll('.star').forEach(s=>s.classList.remove('active'));
  document.getElementById('reviewModal').classList.add('open');
}
 
function setRating(v) {
  currentRating = v;
  document.querySelectorAll('.star').forEach(s=>s.classList.toggle('active', +s.dataset.v<=v));
}
 
async function submitReview() {
  if(!currentRating) return toast('Please select a rating.','error');
  const comment = document.getElementById('reviewComment').value.trim();
  const res = await api('/review','POST',{user_id:currentUser.user_id,book_id:reviewBookId,rating:currentRating,comment});
  if(res.success){ toast(res.message,'success'); closeModal('reviewModal'); }
}
 
function closeModal(id){ document.getElementById(id).classList.remove('open'); }
 
// ── UTILITIES ─────────────────────────────────────────────────
async function api(endpoint, method='GET', body=null) {
  try {
    const opts = { method, headers:{'Content-Type':'application/json'} };
    if(body) opts.body = JSON.stringify(body);
    const res = await fetch(API+endpoint, opts);
    const data = await res.json();
    if(!res.ok) { toast(data.detail||'An error occurred.','error'); return {}; }
    return data;
  } catch(e) {
    toast('Cannot connect to server. Start backend.py first.','error');
    return {};
  }
}
 
let toastTimer;
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIcon').textContent = type==='success' ? '✓' : '✗';
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.className='',3500);
}
</script>
